<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Amir — Private Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root{
  --bg:       #0F172A;
  --surface:  #1E293B;
  --surface2: #263347;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(139,92,246,.35);
  --purple:   #8B5CF6;
  --purple2:  #A78BFA;
  --purple-glow: rgba(139,92,246,.18);
  --text:     #F8FAFC;
  --text2:    #94A3B8;
  --text3:    #475569;
  --success:  #34D399;
  --warning:  #FBBF24;
  --danger:   #F87171;
  --radius:   16px;
  --radius-sm:10px;
  --radius-xs:7px;
  --font-en:  'Space Grotesk', system-ui, sans-serif;
  --font-fa:  'Vazirmatn', system-ui, sans-serif;
  --ease:     cubic-bezier(.25,.46,.45,.94);
  --ease-out: cubic-bezier(0,.55,.45,1);
}

/* ─── RESET ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-fa);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  direction:rtl;
  overflow-x:hidden;
  line-height:1.6;
}
::selection{background:var(--purple);color:#fff}

/* ─── CANVAS PARTICLE FIELD ─────────────────────────────── */
#particle-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;opacity:.45;
}

/* ─── AMBIENT GLOWS ─────────────────────────────────────── */
.ambient{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(120px);opacity:.15}
.ambient-1{width:600px;height:600px;background:#8B5CF6;top:-200px;right:-100px}
.ambient-2{width:400px;height:400px;background:#3B82F6;bottom:-100px;left:-50px}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.page{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:0 1.25rem 6rem}

/* ─── HERO ───────────────────────────────────────────────── */
.hero{
  text-align:center;
  padding:3.5rem 0 2.5rem;
  animation:fadeUp .8s var(--ease) both;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:var(--font-en);font-size:.65rem;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--purple2);
  background:rgba(139,92,246,.1);
  border:1px solid rgba(139,92,246,.25);
  border-radius:99px;padding:.35rem .9rem;margin-bottom:1.4rem;
}
.hero-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--success);
  box-shadow:0 0 8px var(--success);
  animation:blink 2s ease-in-out infinite;
}
.hero-name{
  font-family:var(--font-en);
  font-size:clamp(2.8rem,8vw,4.2rem);
  font-weight:700;
  letter-spacing:-.04em;
  line-height:1;
  background:linear-gradient(135deg,#F8FAFC 0%,var(--purple2) 60%,#818CF8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.6rem;
}
.hero-sub{
  font-size:.88rem;color:var(--text2);font-weight:300;
  letter-spacing:.02em;
}

/* ─── DIVIDER ────────────────────────────────────────────── */
.divider{
  display:flex;align-items:center;gap:.75rem;
  margin:1.5rem 0;color:var(--text3);font-size:.65rem;
  font-family:var(--font-en);letter-spacing:.1em;text-transform:uppercase;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}

/* ─── GLASS CARD ─────────────────────────────────────────── */
.card{
  background:rgba(30,41,59,.7);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem 1.4rem;
  margin-bottom:.9rem;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:border-color .3s var(--ease), box-shadow .3s var(--ease);
  animation:fadeUp .6s var(--ease) both;
}
.card:hover{
  border-color:rgba(139,92,246,.2);
  box-shadow:0 0 0 1px rgba(139,92,246,.08);
}

/* ─── SUB LINK ───────────────────────────────────────────── */
.card-label{
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-en);font-size:.62rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text3);margin-bottom:.8rem;
}
.link-wrap{
  display:flex;gap:.6rem;align-items:center;
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.05);
  border-radius:var(--radius-sm);padding:.6rem .85rem;
}
.link-text{
  flex:1;font-family:monospace;font-size:.68rem;
  color:var(--text3);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  direction:ltr;text-align:left;user-select:all;cursor:text;
}
.btn-primary{
  flex-shrink:0;
  background:var(--purple);
  border:none;border-radius:var(--radius-xs);
  color:#fff;font-family:var(--font-fa);
  font-size:.78rem;font-weight:600;
  padding:.5rem 1.1rem;cursor:pointer;
  transition:all .2s var(--ease);
  box-shadow:0 4px 20px rgba(139,92,246,.4);
  white-space:nowrap;
}
.btn-primary:hover{background:#7C3AED;transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.5)}
.btn-primary:active{transform:translateY(0)}
.btn-primary.ok{background:var(--success);box-shadow:0 4px 20px rgba(52,211,153,.4);color:#052e16}
.btn-primary.fail{background:var(--danger);box-shadow:0 4px 20px rgba(248,113,113,.3)}

/* ─── USAGE ──────────────────────────────────────────────── */
.usage-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:.9rem}
.usage-label-block{}
.usage-label-en{font-family:var(--font-en);font-size:.6rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.usage-label-fa{font-size:.8rem;color:var(--text2);margin-top:.1rem}
.usage-number{text-align:left;direction:ltr}
.usage-gb{font-family:var(--font-en);font-size:1.6rem;font-weight:700;color:var(--text);line-height:1}
.usage-gb span{font-size:.8rem;font-weight:400;color:var(--text2);margin-right:.2rem}
.usage-track{
  width:100%;height:6px;border-radius:99px;
  background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:.6rem;
}
.usage-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--purple),#818CF8);
  transition:width .8s var(--ease-out);
  position:relative;overflow:hidden;
}
.usage-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.3) 50%,transparent 100%);
  animation:shimmer 2s linear infinite;
}
.usage-fill.warn{background:linear-gradient(90deg,var(--warning),#F59E0B)}
.usage-fill.danger{background:linear-gradient(90deg,var(--danger),#EF4444)}
.usage-meta{display:flex;justify-content:space-between;font-size:.68rem;color:var(--text3)}
.usage-reset{font-family:var(--font-en);direction:ltr}

/* ─── STATS ──────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.9rem}
.stat-card{
  background:rgba(30,41,59,.5);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:.8rem .6rem;text-align:center;
  backdrop-filter:blur(12px);
  transition:all .25s var(--ease);
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-n{
  font-family:var(--font-en);font-size:1.3rem;
  font-weight:700;color:var(--purple2);line-height:1;
}
.stat-l{font-size:.62rem;color:var(--text3);margin-top:.3rem;font-weight:500}

/* ─── TABS ───────────────────────────────────────────────── */
.tabs{
  display:flex;gap:.3rem;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:.3rem;margin-bottom:.9rem;
  backdrop-filter:blur(12px);
}
.tab{
  flex:1;background:transparent;
  border:1px solid transparent;
  border-radius:var(--radius-xs);
  color:var(--text3);
  font-family:var(--font-fa);font-size:.78rem;font-weight:600;
  padding:.5rem .3rem;cursor:pointer;
  transition:all .2s var(--ease);white-space:nowrap;
}
.tab:hover{color:var(--text2)}
.tab.active{
  background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(99,102,241,.2));
  border-color:rgba(139,92,246,.4);
  color:var(--purple2);
  box-shadow:0 0 20px rgba(139,92,246,.15);
}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ─── ACTIONS ────────────────────────────────────────────── */
.actions-row{display:flex;gap:.5rem;margin-bottom:.75rem}
.btn-ghost{
  flex:1;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:var(--radius-xs);
  color:var(--text2);
  font-family:var(--font-fa);font-size:.73rem;font-weight:600;
  padding:.55rem;cursor:pointer;
  transition:all .2s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:.35rem;
}
.btn-ghost:hover{background:rgba(139,92,246,.1);border-color:var(--border2);color:var(--purple2)}
.btn-ghost.ok{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.35);color:var(--success)}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}

/* ─── SEARCH ─────────────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:.75rem}
.search-icon{
  position:absolute;right:.85rem;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:.85rem;pointer-events:none;
}
.search-input{
  width:100%;background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:var(--radius-xs);
  padding:.55rem 2.2rem .55rem .9rem;
  color:var(--text);
  font-family:var(--font-fa);font-size:.78rem;
  direction:rtl;transition:border-color .2s var(--ease);
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{outline:none;border-color:rgba(139,92,246,.5);box-shadow:0 0 0 3px rgba(139,92,246,.08)}

/* ─── FILTER PILLS ───────────────────────────────────────── */
.pills{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.pill{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:99px;
  color:var(--text3);
  font-size:.68rem;font-weight:600;
  padding:.28rem .75rem;cursor:pointer;
  transition:all .2s var(--ease);font-family:var(--font-fa);
}
.pill:hover{color:var(--text2)}
.pill.active{
  background:rgba(139,92,246,.15);
  border:1.5px solid var(--purple);
  color:var(--purple2);
  box-shadow:0 0 0 3px rgba(139,92,246,.1);
}

/* ─── CONFIG GROUPS ──────────────────────────────────────── */
.groups{display:flex;flex-direction:column;gap:.5rem}
.group{
  background:rgba(30,41,59,.5);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  backdrop-filter:blur(16px);
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease);
}
.group.open{
  border-color:rgba(139,92,246,.4);
  box-shadow:0 0 0 3px rgba(139,92,246,.08),0 8px 32px rgba(0,0,0,.2);
}
.group-head{
  display:flex;align-items:center;gap:.8rem;
  padding:.9rem 1.1rem;cursor:pointer;user-select:none;
}
.group-icon{
  flex-shrink:0;width:36px;height:36px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:transform .2s var(--ease);
}
.group.open .group-icon{transform:scale(1.05)}
.gi-domain{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3)}
.gi-ipv4{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3)}
.gi-clean{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25)}
.gi-other{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2)}
.group-meta{flex:1;min-width:0}
.group-title{font-size:.85rem;font-weight:600;color:var(--text)}
.group-desc{font-family:var(--font-en);font-size:.65rem;color:var(--text3);margin-top:.1rem;direction:ltr;text-align:right}
.group-count{
  flex-shrink:0;font-family:var(--font-en);
  font-size:.68rem;font-weight:700;
  background:rgba(139,92,246,.12);
  border:1px solid rgba(139,92,246,.2);
  border-radius:99px;padding:.2rem .6rem;
  color:var(--purple2);
}
.group-chevron{
  flex-shrink:0;color:var(--text3);
  font-size:.7rem;transition:transform .3s var(--ease);
}
.group.open .group-chevron{transform:rotate(180deg)}
.group-body{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.group.open .group-body{max-height:4000px}
.group-items{padding:0 .9rem .9rem;display:flex;flex-direction:column;gap:.4rem}

/* ─── CONFIG ROW ─────────────────────────────────────────── */
.cfg{
  display:flex;align-items:center;gap:.6rem;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.04);
  border-radius:var(--radius-xs);
  padding:.6rem .75rem;
  transition:border-color .2s var(--ease),background .2s var(--ease);
}
.cfg:hover{background:rgba(139,92,246,.05);border-color:rgba(139,92,246,.15)}
.cfg-num{
  flex-shrink:0;width:22px;height:22px;
  border-radius:6px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-en);font-size:.6rem;font-weight:700;color:var(--text3);
}
.cfg-info{flex:1;min-width:0}
.cfg-addr{
  font-family:monospace;font-size:.7rem;color:var(--text2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  direction:ltr;text-align:left;user-select:all;cursor:text;
}
.cfg-port{font-size:.6rem;color:var(--text3);margin-top:.1rem;font-family:var(--font-en);direction:ltr;text-align:left}
.cfg-actions{display:flex;gap:.3rem;flex-shrink:0;align-items:center}
.ping-dot{
  font-family:var(--font-en);font-size:.6rem;font-weight:700;
  padding:.16rem .42rem;border-radius:5px;min-width:40px;text-align:center;
}
.p-wait{background:rgba(255,255,255,.05);color:var(--text3)}
.p-good{background:rgba(52,211,153,.12);color:var(--success)}
.p-mid{background:rgba(251,191,36,.12);color:var(--warning)}
.p-bad{background:rgba(248,113,113,.12);color:var(--danger)}
.btn-fav{
  background:none;border:1px solid rgba(255,255,255,.07);
  border-radius:6px;color:var(--text3);
  font-size:.78rem;padding:.26rem .48rem;cursor:pointer;
  transition:all .15s var(--ease);
}
.btn-fav:hover{border-color:rgba(251,191,36,.4);color:var(--warning)}
.btn-fav.on{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:var(--warning)}
.btn-cfg-copy{
  background:rgba(139,92,246,.1);
  border:1px solid rgba(139,92,246,.22);
  border-radius:6px;color:var(--purple2);
  font-family:var(--font-fa);font-size:.65rem;font-weight:700;
  padding:.3rem .55rem;cursor:pointer;
  transition:all .15s var(--ease);
}
.btn-cfg-copy:hover{background:rgba(139,92,246,.2)}
.btn-cfg-copy.ok{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.35);color:var(--success)}
.btn-cfg-copy.fail{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35);color:var(--danger)}

/* ─── EMPTY ──────────────────────────────────────────────── */
.empty{text-align:center;padding:2.5rem 0;color:var(--text3);font-size:.82rem}

/* ─── QR TAB ─────────────────────────────────────────────── */
.qr-panel{
  background:rgba(30,41,59,.5);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:2rem;
  display:flex;flex-direction:column;align-items:center;gap:1.1rem;
  backdrop-filter:blur(16px);
}
.qr-frame{
  background:#fff;border-radius:var(--radius-sm);
  padding:10px;
  box-shadow:0 0 0 1px rgba(255,255,255,.05),0 16px 48px rgba(0,0,0,.5);
  line-height:0;min-width:200px;min-height:200px;
  display:flex;align-items:center;justify-content:center;
}
.qr-caption{color:var(--text2);font-size:.8rem;text-align:center}

/* ─── APPS TAB ───────────────────────────────────────────── */
.apps-list{display:flex;flex-direction:column;gap:.6rem}
.app-card{
  background:rgba(30,41,59,.5);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:.9rem 1.1rem;
  backdrop-filter:blur(12px);
  transition:all .2s var(--ease);
}
.app-card:hover{border-color:rgba(139,92,246,.25);transform:translateY(-1px)}
.app-top{display:flex;align-items:center;gap:.75rem;margin-bottom:.65rem}
.app-ic{font-size:1.5rem}
.app-name{font-size:.9rem;font-weight:700;color:var(--text)}
.app-desc{font-size:.68rem;color:var(--text3);margin-top:.1rem}
.app-btns{display:flex;gap:.45rem;flex-wrap:wrap}
.app-btn-link{
  flex:1;min-width:90px;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
  background:rgba(139,92,246,.1);
  border:1px solid rgba(139,92,246,.25);
  border-radius:var(--radius-xs);
  color:var(--purple2);
  text-decoration:none;font-size:.72rem;font-weight:700;
  padding:.48rem .7rem;transition:all .2s var(--ease);
  font-family:var(--font-fa);
}
.app-btn-link:hover{background:rgba(139,92,246,.2);transform:translateY(-1px)}
.app-btn-link.import{
  background:rgba(52,211,153,.08);
  border-color:rgba(52,211,153,.25);color:var(--success);
}
.app-btn-link.import:hover{background:rgba(52,211,153,.15)}

/* ─── FOOTER ─────────────────────────────────────────────── */
.footer{
  text-align:center;padding:2rem 0 0;
  font-family:var(--font-en);font-size:.65rem;
  color:var(--text3);letter-spacing:.06em;
}

/* ─── TOAST ──────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:2.5rem;left:50%;
  transform:translateX(-50%) translateY(70px);
  opacity:0;
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);
  color:var(--text);font-weight:600;font-size:.82rem;
  padding:.65rem 1.6rem;border-radius:99px;
  white-space:nowrap;z-index:999;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(139,92,246,.2);
  pointer-events:none;backdrop-filter:blur(20px);
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok-toast::before{content:'✓ ';color:var(--success)}
#toast.err-toast::before{content:'✕ ';color:var(--danger)}

/* ─── ERROR BANNER ───────────────────────────────────────── */
.error-banner{
  display:none;
  background:rgba(248,113,113,.07);
  border:1px solid rgba(248,113,113,.25);
  border-radius:var(--radius-sm);
  padding:.8rem 1rem;margin-bottom:.9rem;
  font-size:.74rem;color:var(--danger);line-height:1.65;
}
.error-banner.show{display:block}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.spin{animation:spin .7s linear}

/* staggered card animations */
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}

/* ─── REDUCED MOTION ─────────────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
@media(max-width:420px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .app-btns{flex-direction:column}
}
</style>
</head>
<body>

<!-- Ambient background -->
<canvas id="particle-canvas"></canvas>
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<script>
/* ─── PARTICLE FIELD ─────────────────────────────────────── */
(function initParticles(){
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles=[], animId;
  const N=55, MAX_DIST=130, SPEED=.28;

  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize',resize); resize();

  function rand(a,b){return a+Math.random()*(b-a)}
  for(let i=0;i<N;i++) particles.push({
    x:rand(0,W),y:rand(0,H),
    vx:rand(-SPEED,SPEED),vy:rand(-SPEED,SPEED),
    r:rand(.8,2)
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(139,92,246,.6)';
      ctx.fill();
    });
    // connections
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<MAX_DIST){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(139,92,246,${.18*(1-d/MAX_DIST)})`;
        ctx.lineWidth=.6;
        ctx.stroke();
      }
    }
    animId=requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── APP ────────────────────────────────────────────────── */
const App = (() => {

  /* ---- EDIT THESE ---- */
  const SUB_URL   = "https://broken-violet-56ff.shntyagshtasby37.workers.dev/sub/normal/SP9MGomefBURESFP?app=xray";
  const NAME      = "Amir";
  const AUTO_MIN  = 10; // auto-refresh interval (minutes)
  /* -------------------- */

  const APPS = [
    {name:"v2rayNG",   icon:"🟢",desc:"Android · Free & Open Source",
     imp:"v2rayng://install-sub?url=",dl:"https://github.com/2dust/v2rayNG/releases/latest"},
    {name:"Hiddify",   icon:"🔵",desc:"Android / Windows / Mac / Linux",
     imp:"hiddify://import/",dl:"https://github.com/hiddify/hiddify-app/releases/latest"},
    {name:"NekoRay",   icon:"🐱",desc:"Windows / Linux",
     imp:"nekoray://import?url=",dl:"https://github.com/MatsuriDayo/nekoray/releases/latest"},
    {name:"Streisand", icon:"⚡",desc:"iOS / macOS",
     imp:"streisand://import?url=",dl:"https://apps.apple.com/app/streisand/id6450534064"},
  ];

  const GROUP_META = {
    "Domain":   {icon:"🌐",cls:"gi-domain",fa:"دامنه",en:"Domain"},
    "IPv4":     {icon:"🔢",cls:"gi-ipv4",  fa:"آی‌پی مستقیم",en:"Direct IP"},
    "Clean IP": {icon:"✨",cls:"gi-clean", fa:"آی‌پی پاک",en:"Clean IP"},
    "Other":    {icon:"🔗",cls:"gi-other", fa:"سایر",en:"Other"},
  };

  let CONFIGS=[], favorites=new Set(), pings={}, openGroups=new Set();
  let filter="All", qrMade=false, fetchOk=false;

  const $=id=>document.getElementById(id);

  /* ── USAGE (daily, resets at midnight) ── */
  function todayKey(){ return 'usage_'+new Date().toLocaleDateString('en-CA'); }
  function getUsage(){
    const raw=localStorage.getItem('amir_usage');
    if(!raw) return {date:todayKey(),visits:0,gb:0};
    try{ const d=JSON.parse(raw); if(d.date!==todayKey()) return {date:todayKey(),visits:0,gb:0}; return d; }
    catch(e){ return {date:todayKey(),visits:0,gb:0}; }
  }
  function saveUsage(u){ localStorage.setItem('amir_usage',JSON.stringify(u)); }
  function initUsage(){
    const u=getUsage();
    u.visits+=1;
    // Simulate daily data increase: each visit adds a small random amount.
    // To integrate with real CF analytics, replace this with a fetch to your analytics endpoint.
    u.gb=parseFloat((u.gb+Math.random()*0.25+0.05).toFixed(2));
    saveUsage(u);
    renderUsage(u);
  }
  function renderUsage(u){
    const cap=50; // daily cap in GB for the bar (visual only)
    const pct=Math.min(100,Math.round((u.gb/cap)*100));
    $('usage-val').textContent=u.gb.toFixed(2);
    $('usage-bar').style.width=pct+'%';
    $('usage-bar').className='usage-fill'+(pct>=90?' danger':pct>=70?' warn':'');
    $('usage-visits').textContent=u.visits+' بار بازدید امروز';
    // Time until midnight
    const now=new Date(), midnight=new Date(now);
    midnight.setHours(24,0,0,0);
    const hrs=Math.floor((midnight-now)/3600000);
    const mins=Math.floor(((midnight-now)%3600000)/60000);
    $('usage-reset-label').textContent=`ریست: ${hrs}h ${mins}m دیگر`;
    $('usage-reset-time').textContent=`/ reset in ${hrs}h ${mins}m`;
  }

  /* ── FETCH & PARSE ── */
  async function fetchSub(){
    setBadge('loading');
    $('hero-sub').textContent='در حال بارگذاری کانفیگ‌ها...';
    showErr('');
    try{
      const res=await fetch(SUB_URL,{cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      const cfgs=parseSub(text);
      if(!cfgs.length) throw new Error('هیچ کانفیگی یافت نشد');
      CONFIGS=cfgs; fetchOk=true;
      onLoaded();
    }catch(err){
      fetchOk=false; setBadge('error');
      $('hero-sub').textContent='خطا در بارگذاری';
      showErr('⚠️ اتصال به لینک ساب ناموفق بود: '+err.message);
      if(!CONFIGS.length) $('groups').innerHTML=`<div class="empty">کانفیگی برای نمایش وجود ندارد</div>`;
    }
  }

  function parseSub(text){
    const t=text.trim();
    let cfgs;
    if(t.startsWith('[')){
      try{ cfgs=JSON.parse(t).map((x,i)=>parseJson(x,i)).filter(Boolean); }
      catch(e){}
    }
    if(!cfgs){
      let dec=t;
      if(!/^(vless|vmess|ss|trojan):\/\//.test(t)){
        try{ dec=atob(t.replace(/\s/g,'')); }catch(e){ dec=t; }
      }
      cfgs=dec.split('\n').map((l,i)=>parseLine(l.trim(),i)).filter(Boolean);
    }
    return renameAll(cfgs);
  }

  function parseJson(item,idx){
    try{
      const ob=(item.outbounds||[]).find(o=>['vless','vmess','trojan','shadowsocks'].includes(o.protocol));
      if(!ob) return null;
      const vn=(ob.settings?.vnext?.[0])||{};
      const addr=vn.address||''; const port=vn.port||0;
      const user=(vn.users?.[0])||{};
      const ss=ob.streamSettings||{}; const ws=ss.wsSettings||{}; const tls=ss.tlsSettings||{};
      let raw=null;
      if(ob.protocol==='vless'&&user.id){
        const p=new URLSearchParams();
        p.set('encryption',user.encryption||'none');
        if(ss.security) p.set('security',ss.security);
        if(ss.network)  p.set('type',ss.network);
        if(ws.host)     p.set('host',ws.host);
        if(ws.path)     p.set('path',ws.path);
        if(tls.serverName) p.set('sni',tls.serverName);
        raw=`vless://${user.id}@${addr}:${port}?${p}#placeholder`;
      }
      return {id:idx+1,raw,type:classify(addr,item.remarks||''),addr,port,remark:item.remarks||''};
    }catch(e){return null;}
  }

  function parseLine(line,idx){
    if(!line) return null;
    const pm=line.match(/^(vless|vmess|ss|trojan):\/\//);
    if(!pm) return null;
    const proto=pm[1];
    let addr='',port=0,remark='';
    if(proto==='vmess'){
      try{ const j=JSON.parse(atob(line.replace('vmess://',''))); addr=j.add||''; port=parseInt(j.port)||0; remark=j.ps||''; }
      catch(e){ return null; }
    } else {
      const ap=line.replace(pm[0],'');
      const hi=ap.indexOf('#'); const bh=hi>=0?ap.slice(0,hi):ap;
      const hp=hi>=0?ap.slice(hi+1):'';
      if(hp){ try{ remark=decodeURIComponent(hp); }catch(e){ remark=hp; } }
      const ai=bh.lastIndexOf('@'); const hprt=(ai>=0?bh.slice(ai+1):bh).split('?')[0];
      const lc=hprt.lastIndexOf(':');
      if(lc>-1){ addr=hprt.slice(0,lc); port=parseInt(hprt.slice(lc+1))||0; }
      else addr=hprt;
    }
    return {id:idx+1,raw:line,type:classify(addr,remark),addr,port,remark};
  }

  function classify(addr,remark){
    const r=(remark||'').toLowerCase();
    if(r.includes('clean')) return 'Clean IP';
    if(r.includes('domain')) return 'Domain';
    if(r.includes('ipv4')||r.includes('ipv6')) return 'IPv4';
    return /^\d{1,3}(\.\d{1,3}){3}$/.test(addr)||(!addr.includes('.')&&addr.includes(':')) ? 'IPv4' : addr ? 'Domain' : 'Other';
  }

  function renameAll(cfgs){
    const counters={};
    return cfgs.map(c=>{
      const tl=(c.type||'Other').replace(/\s+/g,'');
      counters[tl]=(counters[tl]||0)+1;
      const remark=`${NAME}-${tl}-${counters[tl]}`;
      return {...c,remark,raw:renameRaw(c.raw,remark,c.type==='vmess')};
    });
  }
  function renameRaw(raw,remark,isVmess){
    if(!raw) return raw;
    if(isVmess){
      try{ const j=JSON.parse(atob(raw.replace('vmess://',''))); j.ps=remark; return 'vmess://'+btoa(JSON.stringify(j)); }
      catch(e){ return raw; }
    }
    const hi=raw.indexOf('#');
    return (hi>=0?raw.slice(0,hi):raw)+'#'+encodeURIComponent(remark);
  }

  /* ── RENDER ── */
  function onLoaded(){
    const types=[...new Set(CONFIGS.map(c=>c.type))];
    const ports=[...new Set(CONFIGS.map(c=>c.port).filter(Boolean))];
    $('s-total').textContent=CONFIGS.length;
    $('s-clean').textContent=CONFIGS.filter(c=>c.type==='Clean IP').length;
    $('s-ports').textContent=ports.length;
    $('sub-link-text').textContent=SUB_URL;
    setBadge('ok');
    $('hero-sub').textContent=`${CONFIGS.length} کانفیگ فعال · ${NAME} Private Network`;
    renderPills(); renderGroups(); renderApps();
    $('footer-year').textContent=new Date().getFullYear();
    pings={};
  }

  function setBadge(state){
    const b=$('status-badge');
    if(state==='loading') b.textContent='در حال بارگذاری...';
    else if(state==='error') b.textContent='⚠ خطا در اتصال';
    else b.textContent='Private Network · آنلاین';
  }
  function showErr(msg){
    const el=$('error-banner');
    if(!msg){ el.classList.remove('show'); el.textContent=''; return; }
    el.textContent=msg; el.classList.add('show');
  }

  function renderPills(){
    const types=[...new Set(CONFIGS.map(c=>c.type))];
    const all=['All',...types,'⭐'];
    $('pills').innerHTML=all.map(t=>{
      let label;
      if(t==='All') label=`همه (${CONFIGS.length})`;
      else if(t==='⭐') label=`⭐ (${favorites.size})`;
      else label=`${t} (${CONFIGS.filter(c=>c.type===t).length})`;
      return `<button class="pill ${t===filter?'active':''}" onclick="App.setFilter('${t}')">${label}</button>`;
    }).join('');
  }
  function setFilter(t){ filter=t; renderPills(); renderGroups(); }

  function renderGroups(){
    const q=$('search').value.trim().toLowerCase();
    const types=[...new Set(CONFIGS.map(c=>c.type))];
    const keys=filter==='All'||filter==='⭐'?types:[filter];
    let html=''; let any=false;

    keys.forEach(key=>{
      let items=CONFIGS.filter(c=>c.type===key);
      if(filter==='⭐') items=items.filter(c=>favorites.has(c.id));
      if(q) items=items.filter(c=>c.addr.toLowerCase().includes(q)||c.remark.toLowerCase().includes(q)||String(c.port).includes(q));
      if(!items.length) return;
      any=true;
      const m=GROUP_META[key]||GROUP_META.Other;
      const isOpen=openGroups.has(key);
      const ports=[...new Set(items.map(i=>i.port))].sort((a,b)=>a-b).join(', ');

      html+=`
      <div class="group ${isOpen?'open':''}">
        <div class="group-head" onclick="App.toggleGroup('${key}')">
          <div class="group-icon ${m.cls}">${m.icon}</div>
          <div class="group-meta">
            <div class="group-title">${m.fa}</div>
            <div class="group-desc">${m.en} · port ${ports}</div>
          </div>
          <div class="group-count">${items.length}</div>
          <div class="group-chevron">▾</div>
        </div>
        <div class="group-body"><div class="group-items">
          ${items.map(c=>{
            const bid='cc-'+c.id;
            const pr=pings[c.id];
            let pingHtml=pr===undefined?`<span class="ping-dot p-wait" id="p-${c.id}">--</span>`:
              pr===null?`<span class="ping-dot p-bad" id="p-${c.id}">✕</span>`:
              `<span class="ping-dot ${pr<200?'p-good':pr<500?'p-mid':'p-bad'}" id="p-${c.id}">${pr}ms</span>`;
            return `
            <div class="cfg">
              <div class="cfg-num">${c.id}</div>
              <div class="cfg-info">
                <div class="cfg-addr" ondblclick="App.sel(this)">${c.addr}</div>
                <div class="cfg-port">${c.remark} · :${c.port}</div>
              </div>
              <div class="cfg-actions">
                ${pingHtml}
                <button class="btn-fav ${favorites.has(c.id)?'on':''}" onclick="App.fav(${c.id},this)">★</button>
                <button class="btn-cfg-copy" id="${bid}" onclick="App.copyCfg(${c.id},'${bid}')">کپی</button>
              </div>
            </div>`;
          }).join('')}
        </div></div>
      </div>`;
    });
    $('groups').innerHTML=any?html:`<div class="empty">کانفیگی یافت نشد</div>`;
  }

  function toggleGroup(k){
    openGroups.has(k)?openGroups.delete(k):openGroups.add(k);
    renderGroups();
  }

  function renderApps(){
    $('apps-list').innerHTML=APPS.map(a=>`
      <div class="app-card">
        <div class="app-top"><span class="app-ic">${a.icon}</span>
          <div><div class="app-name">${a.name}</div><div class="app-desc">${a.desc}</div></div>
        </div>
        <div class="app-btns">
          <a class="app-btn-link" href="${a.dl}" target="_blank" rel="noopener">⬇ دانلود</a>
          <a class="app-btn-link import" href="${a.imp}${encodeURIComponent(SUB_URL)}">📥 افزودن خودکار</a>
        </div>
      </div>`).join('');
  }

  /* ── COPY ── */
  function copy(text){
    return new Promise(r=>{
      if(navigator.clipboard&&window.isSecureContext)
        return navigator.clipboard.writeText(text).then(()=>r(true)).catch(()=>r(fb(text)));
      r(fb(text));
    });
  }
  function fb(text){
    try{
      const t=document.createElement('textarea');
      t.value=text;t.style.cssText='position:fixed;left:-9999px;top:0';
      document.body.appendChild(t);t.focus();t.select();t.setSelectionRange(0,text.length);
      const ok=document.execCommand('copy');
      document.body.removeChild(t);return ok;
    }catch(e){return false;}
  }
  function sel(el){
    const r=document.createRange();r.selectNodeContents(el);
    const s=window.getSelection();s.removeAllRanges();s.addRange(r);
  }

  function copySub(){
    copy(SUB_URL).then(ok=>{
      const b=$('btn-copy-sub');
      b.textContent=ok?'✓ کپی شد':'دوبار کلیک'; b.classList.add(ok?'ok':'fail');
      toast(ok?'لینک کپی شد':'متن انتخاب شد — Ctrl+C بزن',ok?'ok':'err');
      if(!ok) sel($('sub-link-text'));
      setTimeout(()=>{b.textContent='کپی';b.classList.remove('ok','fail');},2400);
    });
  }

  function copyCfg(id,btnId){
    const c=CONFIGS.find(x=>x.id===id);
    if(!c){toast('کانفیگ پیدا نشد','err');return;}
    copy(c.raw||(c.addr+':'+c.port)).then(ok=>{
      const b=$(btnId);
      b.textContent=ok?'✓':'✕';b.classList.add(ok?'ok':'fail');
      toast(ok?'کانفیگ کامل کپی شد':'کپی ناموفق — دوبار کلیک کن',ok?'ok':'err');
      setTimeout(()=>{b.textContent='کپی';b.classList.remove('ok','fail');},2400);
    });
  }

  function copyAll(){
    const text=CONFIGS.map(c=>c.raw||(c.addr+':'+c.port)).join('\n');
    copy(text).then(ok=>{
      const b=$('btn-copy-all');
      b.classList.add(ok?'ok':'');b.textContent=ok?'✓ همه کپی شد':'❌ ناموفق';
      toast(ok?'همه کانفیگ‌ها کپی شدند':'کپی گروهی ناموفق',ok?'ok':'err');
      setTimeout(()=>{b.classList.remove('ok');b.textContent='📋 کپی همه';},2200);
    });
  }

  /* ── PING ── */
  function pingHost(addr){
    return new Promise(r=>{
      const s=performance.now();
      const img=new Image();
      const t=setTimeout(()=>r(null),4000);
      img.onload=img.onerror=()=>{clearTimeout(t);r(Math.round(performance.now()-s));};
      img.src='https://'+addr+'/favicon.ico?_='+Date.now();
    });
  }
  async function pingAll(){
    if(!CONFIGS.length){toast('ابتدا کانفیگ‌ها را بارگذاری کنید','err');return;}
    const b=$('btn-ping'); b.textContent='⏳ در حال تست...'; b.disabled=true;
    [...new Set(CONFIGS.map(c=>c.type))].forEach(t=>openGroups.add(t));
    renderGroups();
    await Promise.all(CONFIGS.map(async c=>{
      const ms=await pingHost(c.addr); pings[c.id]=ms;
      const el=$('p-'+c.id);
      if(el){
        if(ms===null){el.textContent='✕';el.className='ping-dot p-bad';}
        else{el.textContent=ms+'ms';el.className='ping-dot '+(ms<200?'p-good':ms<500?'p-mid':'p-bad');}
      }
    }));
    b.textContent='📶 تست پینگ'; b.disabled=false;
    toast('تست پینگ تمام شد','ok');
  }

  /* ── FAVORITES ── */
  function fav(id,btn){
    favorites.has(id)?favorites.delete(id):favorites.add(id);
    btn.classList.toggle('on',favorites.has(id));
    renderPills();
  }

  /* ── QR ── */
  function ensureQR(){
    if(qrMade) return;
    const frame=$('qr-frame'); frame.innerHTML='';
    try{
      new QRCode(frame,{text:SUB_URL,width:200,height:200,colorDark:'#0F172A',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
      requestAnimationFrame(()=>{
        if(frame.querySelector('canvas')){
          qrMade=true;
          $('qr-caption').textContent='با اپ خود اسکن کنید';
          $('btn-dl-qr').disabled=false;
        }
      });
    }catch(e){$('qr-caption').textContent='خطا در ساخت QR';}
  }
  function dlQR(){
    const c=document.querySelector('#qr-frame canvas');
    if(!c){toast('QR هنوز آماده نیست','err');return;}
    const a=document.createElement('a');
    a.download='amir-sub-qr.png';a.href=c.toDataURL('image/png');a.click();
  }

  /* ── TABS ── */
  function tab(name){
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    $('panel-'+name).classList.add('active');
    if(name==='qr') ensureQR();
  }

  /* ── REFRESH ── */
  function refresh(){
    const b=$('btn-refresh'); b.classList.add('spin');
    fetchSub().finally(()=>{
      b.classList.remove('spin');
      if(fetchOk) toast('کانفیگ‌ها به‌روزرسانی شدند','ok');
    });
  }

  /* ── TOAST ── */
  function toast(msg,type){
    const t=$('toast'); t.className=''; t.textContent=msg;
    if(type==='ok') t.classList.add('ok-toast');
    else if(type==='err') t.classList.add('err-toast');
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid=setTimeout(()=>t.classList.remove('show'),2600);
  }

  /* ── INIT ── */
  function init(){
    $('sub-link-text').textContent=SUB_URL;
    $('footer-year').textContent=new Date().getFullYear();
    initUsage();
    // refresh usage bar every minute (countdown to midnight)
    setInterval(()=>renderUsage(getUsage()), 60000);
    fetchSub();
    setInterval(fetchSub, AUTO_MIN*60*1000);
  }

  return {init,tab,refresh,copySub,copyCfg,copyAll,pingAll,fav,setFilter,toggleGroup,dlQR,sel,selectText:sel};
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
